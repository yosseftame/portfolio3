<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم - إدارة المشاريع</title>
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">لوحة التحكم</div>
        <div class="nav-right">
          <span id="username-display" class="username"></span>
          <button id="logout-btn" class="btn-logout">تسجيل الخروج</button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div id="login-form" class="auth-container">
        <div class="auth-box">
          <h1>دخول لوحة التحكم</h1>
          <form id="login-form-element">
            <input
              type="text"
              id="username"
              placeholder="اسم المستخدم"
              required
            />
            <input
              type="password"
              id="password"
              placeholder="كلمة المرور"
              required
            />
            <button type="submit" class="btn-primary">دخول</button>
          </form>
          <p class="toggle-auth">
            ليس لديك حساب؟ <a href="#" id="toggle-register">إنشاء حساب</a>
          </p>
        </div>
      </div>

      <div id="register-form" class="auth-container" style="display: none">
        <div class="auth-box">
          <h1>إنشاء حساب جديد</h1>
          <form id="register-form-element">
            <input
              type="text"
              id="reg-username"
              placeholder="اسم المستخدم"
              required
            />
            <input
              type="password"
              id="reg-password"
              placeholder="كلمة المرور"
              required
            />
            <button type="submit" class="btn-primary">إنشاء حساب</button>
          </form>
          <p class="toggle-auth">
            لديك حساب؟ <a href="#" id="toggle-login">دخول</a>
          </p>
        </div>
      </div>

      <div id="dashboard" class="dashboard" style="display: none">
        <aside class="sidebar">
          <nav>
            <ul>
              <li>
                <a
                  href="#projects"
                  class="nav-link active"
                  data-section="projects"
                  >المشاريع</a
                >
              </li>
              <li>
                <a
                  href="#add-project"
                  class="nav-link"
                  data-section="add-project"
                  >إضافة مشروع</a
                >
              </li>
            </ul>
          </nav>
        </aside>

        <main class="main-content">
          <!-- Projects List Section -->
          <section id="projects-section" class="section active">
            <h2>قائمة المشاريع</h2>
            <div id="projects-container" class="projects-table-container">
              <div class="loading">جاري تحميل المشاريع...</div>
            </div>
          </section>

          <!-- Add Project Section -->
          <section id="add-project-section" class="section">
            <h2>إضافة مشروع جديد</h2>
            <form id="project-form" class="project-form">
              <div class="form-group">
                <label for="title">عنوان المشروع</label>
                <input type="text" id="title" name="title" required />
              </div>

              <div class="form-group">
                <label for="description">الوصف</label>
                <textarea
                  id="description"
                  name="description"
                  rows="4"
                  required
                ></textarea>
              </div>

              <div class="form-group">
                <label for="image">رابط الصورة</label>
                <input type="url" id="image" name="image" />
              </div>

              <div class="form-group">
                <label for="link">رابط المشروع</label>
                <input type="url" id="link" name="link" />
              </div>

              <div class="form-group">
                <label for="github">رابط GitHub</label>
                <input type="url" id="github" name="github" />
              </div>

              <div class="form-group">
                <label for="technologies">التقنيات (افصل بفواصل)</label>
                <input
                  type="text"
                  id="technologies"
                  name="technologies"
                  placeholder="React, Node.js, MongoDB"
                />
              </div>

              <div class="form-group checkbox">
                <input type="checkbox" id="featured" name="featured" />
                <label for="featured">مشروع مميز</label>
              </div>

              <button type="submit" class="btn-primary">إضافة المشروع</button>
            </form>
          </section>
        </main>
      </div>
    </div>

    <script src="js/dashboard.js"></script>
  </body>
</html>
